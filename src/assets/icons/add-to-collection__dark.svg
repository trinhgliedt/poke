<svg width="24" height="24" viewBox="0 0 28 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <clipPath id="ball-clip">
      <circle cx="11" cy="12" r="9"/>
    </clipPath>
  </defs>

  <!-- Base (bottom half off-white) -->
  <circle cx="11" cy="12" r="9" fill="#ECEBE6"/>

  <!-- Top half red -->
  <rect x="2" y="3" width="18" height="9" fill="#ea1616b5" clip-path="url(#ball-clip)"/>

  <!-- Outer line -->
  <circle cx="11" cy="12" r="9" stroke="#5d5d57" stroke-width="1"/>

  <!-- Middle seam with center gap -->
  <path d="M2 12H8.4" stroke="#cdbaba" stroke-width="1" stroke-linecap="round"/>
  <path d="M13.6 12H20" stroke="#cdbaba" stroke-width="1" stroke-linecap="round"/>

  <!-- Center button -->
  <circle cx="11" cy="12" r="2.2" fill="#ECEBE6" stroke="#2f2d2d" stroke-width="1"/>

  <!-- Plus sign -->
  <path d="M22.4 1.4V6.6" stroke="#cdbaba" stroke-width="2" stroke-linecap="round"/>
  <path d="M19.8 4.0H25.0" stroke="#cdbaba" stroke-width="2" stroke-linecap="round"/>
</svg>